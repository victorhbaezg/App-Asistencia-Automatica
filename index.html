<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hombría al Máximo">
  <title>Hombría al Máximo · Asistencia</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root {
      --ink:           #e6edf3;
      --muted:         #8b949e;
      --line:          #30363d;
      --panel:         #161b22;
      --page:          #0d1117;
      --primary:       #006847;
      --primary-light: #00a86b;
      --accent:        #ce1126;
      --gold:          #c9a227;
      --success:       #238636;
      --warning:       #d29922;
      --danger:        #da3633;
      --scan-green:    #00e676;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      background: var(--page);
      color: var(--ink);
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      overscroll-behavior: none;
    }

    button, input { font: inherit; }

    .shell {
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 14px clamp(16px, 4vw, 34px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: relative;
    }

    .topbar::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(0, 168, 107, 0.3);
    }

    .brand-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .brand-text h1 {
      margin: 0;
      font-family: "Oswald", sans-serif;
      font-size: clamp(1.15rem, 2.7vw, 1.75rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1;
      text-transform: uppercase;
      color: #fff;
    }

    .brand-text p {
      margin: 3px 0 0;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .clock {
      display: grid;
      gap: 2px;
      text-align: right;
      white-space: nowrap;
    }

    .clock strong {
      font-family: "Oswald", sans-serif;
      font-size: clamp(1.2rem, 3vw, 1.9rem);
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.06em;
    }

    .clock span {
      color: var(--muted);
      font-size: 0.75rem;
    }

    /* ── EVENT BANNER ── */
    .event-banner {
      background: linear-gradient(135deg, #0a1a0f 0%, #0d1117 50%, #1a0808 100%);
      border-bottom: 1px solid var(--line);
      padding: 10px clamp(16px, 4vw, 34px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      position: relative;
      overflow: hidden;
    }

    .event-banner::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -55deg,
        transparent,
        transparent 22px,
        rgba(255, 255, 255, 0.013) 22px,
        rgba(255, 255, 255, 0.013) 44px
      );
      pointer-events: none;
    }

    .event-teams {
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
    }

    .team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .team-flag {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      line-height: 1;
    }

    .team-name {
      font-family: "Oswald", sans-serif;
      font-size: clamp(0.65rem, 1.6vw, 0.85rem);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .vs-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      flex-shrink: 0;
    }

    .vs-text {
      font-family: "Oswald", sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.08em;
    }

    .event-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
      position: relative;
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      min-height: 0;
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: clamp(14px, 3vw, 28px);
      display: grid;
      grid-template-columns: minmax(300px, 1fr);
      gap: clamp(14px, 3vw, 24px);
      align-items: stretch;
      overflow: hidden;
    }

    /* ── SCANNER PANEL ── */
    .scanner-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .reader-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      background: #020508;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #reader {
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    #reader > div {
      height: 100% !important;
      max-height: 100% !important;
    }

    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
    }

    .target {
      pointer-events: none;
      position: absolute;
      inset: 50%;
      width: min(58vmin, 360px);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border: 1.5px solid rgba(0, 230, 118, 0.6);
      border-radius: 12px;
      box-shadow:
        0 0 0 999px rgba(2, 5, 8, 0.55),
        0 0 20px rgba(0, 230, 118, 0.12);
    }

    /* Animated scan line */
    .target::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(0, 230, 118, 0.5) 20%,
        #00e676 50%,
        rgba(0, 230, 118, 0.5) 80%,
        transparent 100%
      );
      top: 10%;
      animation: scanLine 1.9s ease-in-out infinite alternate;
      box-shadow: 0 0 10px rgba(0, 230, 118, 0.7), 0 0 3px #00e676;
    }

    /* Corner glow highlights */
    .target::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 10px;
      box-shadow:
        inset  14px  14px 0 -11px rgba(0, 230, 118, 0.85),
        inset -14px  14px 0 -11px rgba(0, 230, 118, 0.85),
        inset  14px -14px 0 -11px rgba(0, 230, 118, 0.85),
        inset -14px -14px 0 -11px rgba(0, 230, 118, 0.85);
    }

    @keyframes scanLine {
      from { top: 10%; }
      to   { top: 88%; }
    }

    .scanner-footer {
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid var(--line);
    }

    .event-status {
      min-width: min(460px, 52%);
      display: grid;
      gap: 4px;
    }

    .status-card.success { color: #3fb950; }
    .status-card.warning { color: #e3b341; }
    .status-card.danger  { color: #f85149; }

    .status-label {
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .status-label::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--primary-light);
      animation: dotPulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    .status-card.success .status-label::before { background: #3fb950; animation: none; }
    .status-card.warning .status-label::before { background: #e3b341; animation: none; }
    .status-card.danger  .status-label::before { background: #f85149; animation: none; }

    @keyframes dotPulse {
      0%, 100% { opacity: 1;   transform: scale(1);   }
      50%       { opacity: 0.3; transform: scale(0.7); }
    }

    .status-title {
      margin: 0;
      font-family: "Oswald", sans-serif;
      font-size: clamp(1.1rem, 2.4vw, 1.45rem);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: 0.04em;
    }

    .status-detail {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .btn-action {
      border: 0;
      border-radius: 8px;
      min-height: 44px;
      padding: 0 22px;
      font-family: "Oswald", sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-action:hover  { background: var(--primary-light); }
    .btn-action:active { transform: scale(0.96); }

    .btn-action.secondary {
      background: #21262d;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .btn-action.secondary:hover { background: #2d333b; }

    .btn-action:disabled {
      opacity: 0.45;
      cursor: wait;
    }

    /* ── RESULT ALERT ── */
    .result-alert {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(2, 5, 8, 0.75);
      backdrop-filter: blur(6px);
    }

    .result-alert.open {
      display: grid;
      animation: backdropIn 0.2s ease;
    }

    @keyframes backdropIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .result-box {
      width: min(480px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: clamp(24px, 5vw, 38px);
      text-align: center;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.7);
      border-top: 4px solid var(--primary);
      animation: boxSlideUp 0.25s ease;
    }

    @keyframes boxSlideUp {
      from { transform: translateY(24px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .result-alert.success .result-box { border-top-color: #238636; }
    .result-alert.warning .result-box { border-top-color: var(--warning); }
    .result-alert.danger  .result-box { border-top-color: var(--danger); }

    .result-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 2.2rem;
      font-weight: 900;
      line-height: 1;
      background: rgba(0, 104, 71, 0.15);
      border: 2px solid var(--primary);
      color: var(--primary-light);
    }

    .result-alert.success .result-icon {
      background: rgba(35, 134, 54, 0.15);
      border-color: #238636;
      color: #3fb950;
    }
    .result-alert.warning .result-icon {
      background: rgba(210, 153, 34, 0.15);
      border-color: var(--warning);
      color: #e3b341;
    }
    .result-alert.danger .result-icon {
      background: rgba(218, 54, 51, 0.15);
      border-color: var(--danger);
      color: #f85149;
    }

    .result-box h2 {
      margin: 0;
      font-family: "Oswald", sans-serif;
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .result-box p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: clamp(0.95rem, 2.3vw, 1.1rem);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .topbar { align-items: flex-start; }
      .main   { grid-template-columns: 1fr; }

      .scanner-footer {
        align-items: flex-start;
        flex-direction: column;
      }

      .event-status { min-width: 100%; }
    }

    @media (max-width: 560px) {
      .topbar { flex-direction: column; }
      .clock  { text-align: left; }
    }

    /* ── MÓVIL PEQUEÑO (phones) ── */
    @media (max-width: 430px) {
      .topbar {
        padding: 10px 14px;
        gap: 10px;
      }

      .brand-icon {
        width: 40px;
        height: 40px;
      }

      .event-banner {
        padding: 8px 14px;
        gap: 3px;
      }

      .team-flag { font-size: 1.6rem; }

      .vs-badge {
        width: 30px;
        height: 30px;
      }

      .vs-text { font-size: 0.72rem; }

      .main {
        padding: 10px;
        gap: 10px;
      }

      .scanner-footer {
        padding: 12px 14px;
        gap: 10px;
      }

      .btn-action {
        width: 100%;
        min-height: 48px;
        font-size: 1.05rem;
      }

      .result-box {
        padding: 24px 18px;
        border-radius: 12px;
      }

      .result-icon {
        width: 60px;
        height: 60px;
        font-size: 1.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon"><img src="logo-Naciones.jpg" alt="Logo Naciones"></div>
        <div class="brand-text">
          <h1>Hombría al Máximo</h1>
          <p>Control de asistencia</p>
        </div>
      </div>
      <div class="clock" aria-live="polite">
        <strong id="hora">--:--:--</strong>
        <span id="fecha">--/--/----</span>
      </div>
    </header>

    <div class="event-banner">
      <div class="event-teams">
        <div class="team">
          <span class="team-flag">🇲🇽</span>
          <span class="team-name">México</span>
        </div>
        <div class="vs-badge">
          <span class="vs-text">VS</span>
        </div>
        <div class="team">
          <span class="team-flag">🇰🇷</span>
          <span class="team-name">Corea del Sur</span>
        </div>
      </div>
      <p class="event-label">Copa del Mundo 2026 · Evento especial</p>
    </div>

    <main class="main">
      <section class="scanner-panel" aria-label="Escáner de códigos QR">
        <div class="reader-wrap">
          <div id="reader"></div>
          <div class="target" aria-hidden="true"></div>
        </div>
        <div class="scanner-footer">
          <div class="event-status status-card" id="statusCard" aria-live="polite">
            <span class="status-label" id="cameraText">Preparando cámara…</span>
            <h2 class="status-title" id="statusTitle">Listo para escanear</h2>
            <p class="status-detail" id="statusDetail">Acerca un código QR al recuadro.</p>
          </div>
          <button class="btn-action secondary" id="toggleBtn" type="button">Pausar</button>
        </div>
      </section>
    </main>
  </div>

  <div class="result-alert" id="resultAlert" role="alertdialog" aria-modal="true" aria-labelledby="resultTitle" aria-describedby="resultMessage">
    <div class="result-box">
      <div class="result-icon" id="resultIcon">!</div>
      <h2 id="resultTitle">Resultado</h2>
      <p id="resultMessage">Registro procesado.</p>
    </div>
  </div>

  <script>
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycby3lYGzuC2iEVrRbpMnkd1WYmRKW4GMgRVsQzLVbfEhwPbYsPgFZA3MmwauEwU70hlJbw/exec';
    const DUPLICATE_WINDOW_MS = 12000;

    const state = {
      scanner: null,
      scannerActive: false,
      processing: false,
      paused: false,
      recentScans: new Map(),
      audioCtx: null
    };

    const els = {
      fecha: document.getElementById('fecha'),
      hora: document.getElementById('hora'),
      cameraText: document.getElementById('cameraText'),
      toggleBtn: document.getElementById('toggleBtn'),
      statusCard: document.getElementById('statusCard'),
      statusTitle: document.getElementById('statusTitle'),
      statusDetail: document.getElementById('statusDetail'),
      resultAlert: document.getElementById('resultAlert'),
      resultIcon: document.getElementById('resultIcon'),
      resultTitle: document.getElementById('resultTitle'),
      resultMessage: document.getElementById('resultMessage')
    };

    function updateDateTime() {
      const now = new Date();
      els.fecha.textContent = now.toLocaleDateString('es-MX', {
        weekday: 'long',
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      els.hora.textContent = now.toLocaleTimeString('es-MX', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function setStatus(type, title, detail) {
      els.statusCard.className = 'event-status status-card';
      if (type) els.statusCard.classList.add(type);
      els.statusTitle.textContent = title;
      els.statusDetail.textContent = detail;
    }

    function showResultAlert(type, title, message) {
      return new Promise((resolve) => {
        const icons = {
          success: '✓',
          warning: '!',
          danger: '×'
        };
        let closed = false;
        let timer = null;

        function closeAlert() {
          if (closed) return;
          closed = true;
          clearTimeout(timer);
          els.resultAlert.className = 'result-alert';
          resolve();
        }

        els.resultAlert.className = `result-alert open ${type}`;
        els.resultIcon.textContent = icons[type] || '!';
        els.resultTitle.textContent = title;
        els.resultMessage.textContent = message;

        timer = setTimeout(closeAlert, 2600);
      });
    }

    function getAudioCtx() {
      if (!state.audioCtx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (AudioContext) state.audioCtx = new AudioContext();
      }
      return state.audioCtx;
    }

    function unlockAudio() {
      const ctx = getAudioCtx();
      if (ctx && ctx.state === 'suspended') ctx.resume().catch(() => {});
    }

    function playSound(type) {
      const ctx = getAudioCtx();
      if (!ctx || ctx.state !== 'running') return;

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      const now = ctx.currentTime;
      if (type === 'success') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(760, now);
        osc.frequency.setValueAtTime(980, now + 0.12);
        gain.gain.setValueAtTime(0.28, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.32);
        osc.start(now);
        osc.stop(now + 0.32);
      } else if (type === 'warning') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(430, now);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now);
        osc.stop(now + 0.2);
      } else {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(240, now);
        osc.frequency.setValueAtTime(180, now + 0.14);
        gain.gain.setValueAtTime(0.22, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.36);
        osc.start(now);
        osc.stop(now + 0.36);
      }
    }

    function cleanRecentScans() {
      const now = Date.now();
      for (const [id, timestamp] of state.recentScans.entries()) {
        if (now - timestamp > DUPLICATE_WINDOW_MS) state.recentScans.delete(id);
      }
    }

    function isRecentDuplicate(id) {
      cleanRecentScans();
      const lastSeen = state.recentScans.get(id);
      if (!lastSeen) return false;
      return Date.now() - lastSeen < DUPLICATE_WINDOW_MS;
    }

    function markSeen(id) {
      state.recentScans.set(id, Date.now());
    }

    function jsonpRequest(url) {
      return new Promise((resolve, reject) => {
        const callbackName = `asistenciaCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
        const script = document.createElement('script');
        const separator = url.includes('?') ? '&' : '?';
        const timeoutId = setTimeout(() => {
          cleanup();
          reject(new Error('Tiempo de espera agotado.'));
        }, 15000);

        function cleanup() {
          clearTimeout(timeoutId);
          script.remove();
          delete window[callbackName];
        }

        window[callbackName] = (data) => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('No se pudo conectar.'));
        };

        script.src = `${url}${separator}callback=${encodeURIComponent(callbackName)}`;
        document.body.appendChild(script);
      });
    }

    async function registrar(id) {
      const cleanId = String(id || '').trim();
      if (!cleanId || state.processing) return;

      state.processing = true;
      await stopScanner();

      if (isRecentDuplicate(cleanId)) {
        setStatus('warning', 'QR ya leído', 'Espera unos segundos antes de volver a registrar el mismo código.');
        playSound('warning');
        await showResultAlert('warning', 'QR ya leído', 'Este código fue leído hace unos segundos.');
        state.processing = false;
        if (!state.paused) await startScanner();
        return;
      }

      markSeen(cleanId);
      setStatus('', 'Registrando…', cleanId);

      try {
        const params = new URLSearchParams({
          action: 'registrarAsistencia',
          id_escaneado: cleanId
        });
        const data = await jsonpRequest(`${WEBAPP_URL}?${params.toString()}`);
        if (!data || data.status !== 'ok') {
          throw new Error((data && data.message) || 'No se pudo registrar.');
        }

        setStatus('success', 'Asistencia registrada', 'Puedes pasar el siguiente código QR.');
        playSound('success');
        await showResultAlert('success', 'Asistencia registrada', 'Registro guardado correctamente.');
      } catch (err) {
        state.recentScans.delete(cleanId);
        setStatus('danger', 'Error al guardar', err.message || 'Revisa la conexión e intenta de nuevo.');
        playSound('error');
        await showResultAlert('danger', 'Error al guardar', err.message || 'Revisa la conexión e intenta de nuevo.');
      } finally {
        state.processing = false;
        if (!state.paused) await startScanner();
      }
    }

    async function startScanner() {
      if (state.scannerActive || state.paused) return;

      try {
        state.scanner = state.scanner || new Html5Qrcode('reader');
        const config = {
          fps: 12,
          qrbox: (viewfinderWidth, viewfinderHeight) => {
            const size = Math.floor(Math.min(viewfinderWidth, viewfinderHeight) * 0.72);
            return { width: size, height: size };
          },
          aspectRatio: 1.333
        };

        await state.scanner.start(
          { facingMode: 'user' },
          config,
          (decodedText) => registrar(decodedText)
        );

        state.scannerActive = true;
        els.cameraText.textContent = 'Cámara activa';
        els.toggleBtn.textContent = 'Pausar';
        setStatus('', 'Listo para escanear', 'Acerca un código QR al recuadro.');
      } catch (err) {
        state.scannerActive = false;
        els.cameraText.textContent = 'Cámara no disponible';
        setStatus('danger', 'Activa la cámara', 'Permite el acceso a la cámara y usa el botón Reanudar.');
      }
    }

    async function stopScanner() {
      if (!state.scanner) return;
      try {
        if (state.scanner.isScanning) await state.scanner.stop();
        await state.scanner.clear();
      } catch (err) {
        console.warn('No se pudo detener el escáner:', err);
      } finally {
        state.scanner = null;
        state.scannerActive = false;
      }
    }

    async function toggleScanner() {
      unlockAudio();
      if (state.scannerActive) {
        state.paused = true;
        await stopScanner();
        els.cameraText.textContent = 'Cámara pausada';
        els.toggleBtn.textContent = 'Reanudar';
        setStatus('warning', 'Escaneo pausado', 'Toca Reanudar para continuar registrando.');
      } else {
        state.paused = false;
        els.toggleBtn.textContent = 'Pausar';
        await startScanner();
      }
    }

    function bindEvents() {
      document.addEventListener('pointerdown', unlockAudio, { once: true });
      document.addEventListener('keydown', unlockAudio, { once: true });
      els.toggleBtn.addEventListener('click', toggleScanner);
    }

    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(console.error);
      }
    }

    async function init() {
      bindEvents();
      registerServiceWorker();
      updateDateTime();
      setInterval(updateDateTime, 1000);
      await startScanner();
    }

    init();
  </script>
</body>
</html>
